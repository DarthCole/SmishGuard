# gradle.properties
# -----------------
# Global settings for the Gradle build system.
# These are read BEFORE any build script runs.

# Use AndroidX libraries (the modern replacement for the old "Support Library")
android.useAndroidX=true

# Run Gradle's background process to speed up repeated builds
org.gradle.daemon=true

# Give the Gradle JVM 2 GB of heap memory
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable parallel project execution (builds modules simultaneously)
org.gradle.parallel=true

# Enable Gradle build caching (reuses outputs from previous builds)
org.gradle.caching=true

# Use non-transitive R classes (each module only sees its own resources,
# not resources from dependencies — improves build speed and prevents conflicts)
android.nonTransitiveRClass=true
org.gradle.java.home=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
